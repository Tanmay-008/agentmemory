<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F0F0F"/>
      <stop offset="50%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF8F5E"/>
    </linearGradient>
    <linearGradient id="accent-fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6B35" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#222" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Left side: Logo mark -->
  <g transform="translate(100, 120)">
    <!-- Memory tiers -->
    <rect x="0" y="95" width="120" height="14" rx="7" fill="#252525" opacity="0.5"/>
    <rect x="0" y="75" width="120" height="14" rx="7" fill="#2A2A2A" opacity="0.6"/>
    <rect x="0" y="55" width="120" height="14" rx="7" fill="#333" opacity="0.7"/>
    <rect x="0" y="35" width="120" height="14" rx="7" fill="url(#accent)"/>

    <!-- Active nodes -->
    <circle cx="22" cy="42" r="4" fill="#fff" opacity="0.9"/>
    <circle cx="46" cy="42" r="4" fill="#fff" opacity="0.9"/>
    <circle cx="74" cy="42" r="4" fill="#fff" opacity="0.9"/>
    <circle cx="98" cy="42" r="4" fill="#fff" opacity="0.9"/>

    <!-- Retrieval lines -->
    <line x1="22" y1="37" x2="44" y2="16" stroke="#FF6B35" stroke-width="1.5" opacity="0.6"/>
    <line x1="46" y1="37" x2="52" y2="14" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>
    <line x1="74" y1="37" x2="68" y2="14" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>
    <line x1="98" y1="37" x2="76" y2="16" stroke="#FF6B35" stroke-width="1.5" opacity="0.6"/>

    <!-- Convergence point -->
    <line x1="44" y1="16" x2="60" y2="6" stroke="#FF6B35" stroke-width="1.2" opacity="0.5"/>
    <line x1="76" y1="16" x2="60" y2="6" stroke="#FF6B35" stroke-width="1.2" opacity="0.5"/>
    <line x1="52" y1="14" x2="60" y2="6" stroke="#FF6B35" stroke-width="0.8" opacity="0.3"/>
    <line x1="68" y1="14" x2="60" y2="6" stroke="#FF6B35" stroke-width="0.8" opacity="0.3"/>

    <circle cx="60" cy="4" r="6" fill="url(#accent)"/>
    <circle cx="60" cy="4" r="10" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.3"/>
    <circle cx="60" cy="4" r="16" fill="none" stroke="#FF6B35" stroke-width="0.5" opacity="0.15"/>

    <!-- Decay dots -->
    <circle cx="35" cy="62" r="2" fill="#666" opacity="0.4"/>
    <circle cx="85" cy="62" r="2" fill="#666" opacity="0.4"/>
    <circle cx="50" cy="82" r="1.5" fill="#555" opacity="0.3"/>
    <circle cx="70" cy="82" r="1.5" fill="#555" opacity="0.3"/>
    <circle cx="60" cy="102" r="1" fill="#444" opacity="0.2"/>
  </g>

  <!-- Right side: Text -->
  <text x="320" y="175" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="64" font-weight="200" fill="#FFFFFF" letter-spacing="-0.02em">agent</text>
  <text x="562" y="175" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="64" font-weight="700" fill="url(#accent)" letter-spacing="-0.02em">memory</text>

  <!-- Tagline -->
  <text x="322" y="215" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="20" font-weight="400" fill="#888" letter-spacing="0.02em">Your coding agent remembers everything.</text>

  <!-- Stats bar -->
  <g transform="translate(322, 245)">
    <text font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="600" fill="#FF6B35">95.2%</text>
    <text x="52" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#555">R@5 LongMemEval</text>

    <text x="210" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="600" fill="#FF6B35">43</text>
    <text x="228" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#555">MCP tools</text>

    <text x="330" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="600" fill="#FF6B35">12</text>
    <text x="348" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#555">hooks</text>

    <text x="420" font-family="SF Mono, Menlo, monospace" font-size="13" font-weight="600" fill="#FF6B35">0</text>
    <text x="433" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#555">external deps</text>
  </g>

  <!-- Accent line -->
  <rect x="320" y="280" width="160" height="2" rx="1" fill="url(#accent-fade)"/>

  <!-- Supported agents -->
  <text x="322" y="310" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#444" letter-spacing="0.08em">CLAUDE CODE</text>
  <text x="322" y="310" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#444" letter-spacing="0.08em">
    <tspan x="322">CLAUDE CODE  </tspan>
    <tspan fill="#333">|</tspan>
    <tspan>  CURSOR  </tspan>
    <tspan fill="#333">|</tspan>
    <tspan>  GEMINI CLI  </tspan>
    <tspan fill="#333">|</tspan>
    <tspan>  OPENCODE  </tspan>
    <tspan fill="#333">|</tspan>
    <tspan>  ANY MCP CLIENT</tspan>
  </text>

  <!-- Decorative network nodes (right side, subtle) -->
  <g opacity="0.15">
    <circle cx="950" cy="80" r="3" fill="#FF6B35"/>
    <circle cx="1020" cy="120" r="2" fill="#FF6B35"/>
    <circle cx="1080" cy="70" r="2.5" fill="#FF6B35"/>
    <circle cx="1100" cy="150" r="1.5" fill="#FF6B35"/>
    <circle cx="980" cy="180" r="2" fill="#FF6B35"/>
    <circle cx="1050" cy="200" r="3" fill="#FF6B35"/>
    <circle cx="1120" cy="230" r="1.5" fill="#FF6B35"/>
    <circle cx="970" cy="280" r="2" fill="#FF6B35"/>
    <circle cx="1040" cy="310" r="2.5" fill="#FF6B35"/>
    <circle cx="1100" cy="340" r="2" fill="#FF6B35"/>
    <line x1="950" y1="80" x2="1020" y2="120" stroke="#FF6B35" stroke-width="0.5"/>
    <line x1="1020" y1="120" x2="1080" y2="70" stroke="#FF6B35" stroke-width="0.5"/>
    <line x1="1020" y1="120" x2="1100" y2="150" stroke="#FF6B35" stroke-width="0.5"/>
    <line x1="980" y1="180" x2="1050" y2="200" stroke="#FF6B35" stroke-width="0.5"/>
    <line x1="1050" y1="200" x2="1120" y2="230" stroke="#FF6B35" stroke-width="0.5"/>
    <line x1="1100" y1="150" x2="1050" y2="200" stroke="#FF6B35" stroke-width="0.5"/>
    <line x1="970" y1="280" x2="1040" y2="310" stroke="#FF6B35" stroke-width="0.5"/>
    <line x1="1040" y1="310" x2="1100" y2="340" stroke="#FF6B35" stroke-width="0.5"/>
    <line x1="980" y1="180" x2="970" y2="280" stroke="#FF6B35" stroke-width="0.5"/>
  </g>
</svg>
